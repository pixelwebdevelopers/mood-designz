<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Contact Us - Mood Designz</title>
    <meta name="description" content="Get in touch with Mood Designz. Let's create something magic together. Reach out for inquiries, collaborations, or just to say hello."/>
    
    <!-- Realiz Assets -->
    <link href="realiz/assets/css/main.css" rel="stylesheet"/>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-lime: #c3ff06;
            --brand-bg: #0d2620;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--brand-bg);
            color: #fff;
            overflow-x: hidden;
        }

        /* Conflict Fixes */
        aside, header.fixed { display: none !important; }
    </style>
    <link rel="stylesheet" href="header.css">
</head>
<body class="relative h-[100dvh] w-screen bg-brand-bg text-white overflow-hidden selection:bg-brand-lime selection:text-brand-sidebar tft-page-contact" id="page-top">

    <div id="header-container"></div>

    <div id="main-scroll-container" class="absolute inset-0 overflow-y-auto z-10 bg-brand-bg">
        <!-- Hero Section -->
        <section class="relative w-full py-24 md:py-48 px-8 md:px-20 lg:px-32 flex flex-col overflow-hidden">
            <div class="absolute top-20 right-20 w-64 h-64 bg-brand-lime/10 rounded-full blur-[100px] animate-pulse"></div>
            <div class="reveal-up">
                <span class="font-body text-xs font-bold tracking-[0.3em] text-brand-lime uppercase mb-6 block">Ready to start?</span>
                <h1 class="font-display text-6xl md:text-[10vw] lg:text-[12vw] leading-[0.85] tracking-tighter text-white">
                    Let's create<br><span class="italic text-brand-lime">something</span><br>magic.
                </h1>
            </div>
            
            <div class="w-full h-px bg-white/10 mt-12 mb-20 reveal-up"></div>

            <!-- Contact Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-20 reveal-up">
                <!-- Column 1: Info -->
                <div class="flex flex-col gap-12">
                    <div>
                        <h2 class="font-body text-[10px] font-bold tracking-[0.2em] text-brand-lime uppercase mb-4">Email Inquiry</h2>
                        <a class="font-display text-3xl md:text-4xl hover:text-brand-lime transition-colors block text-white" href="mailto:hello@mooddesignz.com">hello@mooddesignz.com</a>
                    </div>
                    <div>
                        <h2 class="font-body text-[10px] font-bold tracking-[0.2em] text-brand-lime uppercase mb-4">Direct Dial</h2>
                        <a class="font-display text-3xl md:text-3xl hover:text-brand-lime transition-colors block text-white" href="tel:+123456789">+1 (234) 567-890</a>
                    </div>
                </div>

                <!-- Column 2: Form -->
                <div class="lg:col-span-2">
                    <div class="tft-premium-form-wrap">
                        <form action="#" class="tft-contact-form grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="tft-input-group relative">
                                <input class="w-full bg-white/5 border border-white/10 rounded-none p-6 text-white outline-none focus:border-brand-lime transition-colors" placeholder="Full Name" required type="text">
                            </div>
                            <div class="tft-input-group relative">
                                <input class="w-full bg-white/5 border border-white/10 rounded-none p-6 text-white outline-none focus:border-brand-lime transition-colors" placeholder="Email Address" required type="email">
                            </div>
                            <div class="tft-input-group md:col-span-2 relative">
                                <textarea class="w-full bg-white/5 border border-white/10 rounded-none p-6 text-white outline-none focus:border-brand-lime transition-colors min-h-[200px]" placeholder="Your Message" required></textarea>
                            </div>
                            <div class="md:col-span-2 pt-10">
                                <button class="px-12 py-6 bg-brand-lime text-black font-bold uppercase tracking-[0.2em] hover:bg-white transition-all flex items-center gap-4" type="submit">
                                    Send Inquiry
                                    <span class="w-8 h-px bg-black"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- FOOTER -->
        <footer class="py-20 border-t border-white/5 bg-brand-bg">
            <div class="container mx-auto px-6 text-center">
                <img src="logo.png" alt="Logo" class="h-10 mx-auto mb-10 opacity-50">
                <p class="text-white/30 text-sm">© 2026 Mood Designz. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <!-- JS Scripts -->
    <script src="realiz/assets/js/lucide-local.js"></script>
    <script src="realiz/assets/js/main.js"></script>
    <script src="header.js"></script>
</body>
</html>
